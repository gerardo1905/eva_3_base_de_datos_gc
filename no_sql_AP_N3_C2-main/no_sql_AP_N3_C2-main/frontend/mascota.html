<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="shortcut icon" href="./assets/images/among_us_player_red_icon_156942.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/brite.css" />
    <link rel="stylesheet" href="./css/estilos.css" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Vinculamos el script que controlará este formulario (lo crearemos en el próximo paso) -->
    <script src="./scripts/mascota.js"></script>

    <title>Registro de Mascota</title>
</head>

<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
            <div class="container-fluid">
                <div class="collapse navbar-collapse" id="navbarColor01">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="./datos.html">Datos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./formulario.html">Formulario Registro</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="./mascota.html">Registro Mascota</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <br />

    <div class="container">
        <p class="h3">Formulario de Registro de Mascotas</p>
        <br />
        <p class="h5">Datos de la Mascota</p>
        <hr>
        <br>

        <form id="formularioMascota">
            <div class="container">
                <div class="row">
                    <!-- 1. Dueño asignado (Relación 1:N) -->
                    <div class="col-md-4 mb-3">
                        <label for="selectUsuario" class="form-label">Dueño / Usuario:</label>
                        <select name="usuario" id="selectUsuario" class="form-select" onchange="validarInput(this)">
                        <option value="" selected>Seleccione el dueño...</option>
                        </select>
                    </div>
                    <!-- 2. Nombre -->
                    <div class="col-md-4 mb-3">
                        <label for="inputNombre" class="form-label">Nombre Mascota:</label>
                        <input type="text" name="nombre" id="inputNombre" class="form-control" onchange="validarInput(this)" />
                    </div>
                    <!-- 3. Especie -->
                    <div class="col-md-4 mb-3">
                        <label for="inputEspecie" class="form-label">Especie:</label>
                        <input type="text" name="especie" id="inputEspecie" class="form-control" placeholder="Ej: Perro, Gato" onchange="validarInput(this)" />
                    </div>
                </div>

                <div class="row">
                    <!-- 4. Raza -->
                    <div class="col-md-3 mb-3">
                        <label for="inputRaza" class="form-label">Raza:</label>
                        <input type="text" name="raza" id="inputRaza" class="form-control" onchange="validarInput(this)" />
                    </div>
                    <!-- 5. Edad -->
                    <div class="col-md-3 mb-3">
                        <label for="inputEdad" class="form-label">Edad (Años):</label>
                        <input type="number" name="edad" id="inputEdad" class="form-control" onchange="validarInput(this)" />
                    </div>
                    <!-- 6. Peso -->
                    <div class="col-md-3 mb-3">
                        <label for="inputPeso" class="form-label">Peso (Kg):</label>
                        <input type="number" step="0.1" name="peso" id="inputPeso" class="form-control" onchange="validarInput(this)" />
                    </div>
                    <!-- 7. Color -->
                    <div class="col-md-3 mb-3">
                        <label for="inputColor" class="form-label">Color:</label>
                        <input type="text" name="color" id="inputColor" class="form-control" onchange="validarInput(this)" />
                    </div>
                </div>

                <div class="row">
                    <!-- 8. Sexo -->
                    <div class="col-md-4 mb-3">
                        <label for="selectSexo" class="form-label">Sexo:</label>
                        <select name="sexo" id="selectSexo" class="form-select" onchange="validarInput(this)">
                            <option value="" selected>Seleccione sexo...</option>
                            <option value="Macho">Macho</option>
                            <option value="Hembra">Hembra</option>
                        </select>
                    </div>
                    <!-- 9. Fecha Nacimiento -->
                    <div class="col-md-4 mb-3">
                        <label for="inputNacimiento" class="form-label">Fecha Nacimiento:</label>
                        <input type="date" name="fechaNacimiento" id="inputNacimiento" class="form-control" onchange="validarInput(this)" />
                    </div>
                </div>

                <div class="row">
                    <!-- 10. Observaciones -->
                    <div class="col-12 mb-3">
                        <label for="textObservaciones" class="form-label">Observaciones:</label>
                        <textarea name="observaciones" id="textObservaciones" class="form-control" rows="3" placeholder="Detalles médicos, comportamiento, etc."></textarea>
                    </div>
                </div>
                <br />

                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <input type="reset" value="Cancelar" class="btn btn-secondary me-2" />
                        <button type="button" class="btn btn-primary" onclick="validarFormularioMascota()">
                            Enviar Mascota
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
